version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: surveillance
      POSTGRES_PASSWORD: surveillance
      POSTGRES_DB: surveillance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surveillance"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://surveillance:surveillance@db:5432/surveillance
      VIDEO_STORAGE_PATH: /data/videos
    ports:
      - "8000:8000"
    volumes:
      - video_data:/data/videos
      - .:/code   # live-reload friendly for local dev; remove for prod image

volumes:
  pgdata:
  video_data:
